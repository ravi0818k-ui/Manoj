<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candify — Built for Brands That Stand Out</title>
  <meta name="description" content="We help startups and businesses build strong identities, engaging products, and digital experiences that stand out.">
  <link rel="icon" href="framerusercontent.com/sites/icons/default-favicon-light.v1.png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="framerusercontent.com/sites/icons/default-favicon-dark.v1.png" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="#" class="nav__logo" id="nav-logo">Candify</a>
      <button class="nav__menu" id="nav-menu" aria-label="Menu">
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero__bg"></div>
    <div class="hero__content">
      <div class="hero__tag" id="hero-tag"></div>
      <h1 class="hero__title" id="hero-title"></h1>
      <p class="hero__sub" id="hero-sub"></p>
      <div class="hero__actions">
        <div class="hero__buttons" id="hero-buttons"></div>
        <div class="hero__trusted" id="hero-trusted">
          <div class="hero__trusted-avatars" id="trusted-avatars"></div>
          <span class="hero__trusted-text">Trusted by Leaders</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Intro Tickers -->
  <section class="tickers" id="tickers">
    <div class="tickers__grid" id="tickers-grid"></div>
    <a href="#work" class="tickers__cta">
      <span>See Recent Work</span>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 15L15 5M15 5H6M15 5V14" stroke="currentColor" stroke-width="1.5"/></svg>
    </a>
  </section>

  <!-- Intro / Hello -->
  <section class="intro" id="intro">
    <div class="container">
      <div class="intro__tag">
        <span class="intro__divider"></span>
        <em id="intro-greeting">Hello!</em>
        <span class="intro__divider"></span>
      </div>
      <div class="intro__body">
        <p class="intro__text" id="intro-text"></p>
        <div class="intro__services" id="intro-services"></div>
      </div>
    </div>
  </section>

  <!-- Process -->
  <section class="process" id="process">
    <div class="container">
      <div class="section-heading">
        <div class="section-tag">
          <span class="section-tag__line"></span>
          <em id="process-tag"></em>
          <span class="section-tag__line"></span>
        </div>
        <h2 class="section-title" id="process-title"></h2>
      </div>
      <div class="process__cards" id="process-cards"></div>
    </div>
  </section>

  <!-- Testimonials -->
  <section class="testimonials" id="testimonials">
    <div class="container">
      <div class="testimonials__split" id="testimonials-split"></div>
    </div>
  </section>

  <!-- Work / Case Studies -->
  <section class="work" id="work">
    <div class="container">
      <div class="section-heading">
        <div class="section-tag">
          <span class="section-tag__line"></span>
          <em>Our Projects</em>
          <span class="section-tag__line"></span>
        </div>
        <h2 class="section-title">Recent Case Studies</h2>
      </div>
      <div class="work__grid" id="work-grid"></div>
    </div>
  </section>

  <!-- About -->
  <section class="about" id="about">
    <div class="container">
      <div class="section-heading">
        <div class="section-tag">
          <span class="section-tag__line"></span>
          <em>Our Projects</em>
          <span class="section-tag__line"></span>
        </div>
        <h2 class="section-title" id="about-title"></h2>
      </div>
      <div class="about__content">
        <div class="about__image-col">
          <div class="about__image-wrap">
            <img class="about__photo" id="about-photo" src="" alt="Portrait">
          </div>
          <div class="about__image-info">
            <div class="about__socials" id="about-socials"></div>
            <span class="about__founder" id="about-founder"></span>
          </div>
        </div>
        <div class="about__text-col">
          <p class="about__bio" id="about-bio"></p>
          <div class="about__experience" id="about-experience"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Pricing -->
  <section class="pricing" id="pricing">
    <div class="pricing__glow"></div>
    <div class="container">
      <div class="section-heading">
        <div class="section-tag">
          <span class="section-tag__line"></span>
          <em id="pricing-tag"></em>
          <span class="section-tag__line"></span>
        </div>
        <h2 class="section-title" id="pricing-title"></h2>
      </div>
      <div class="pricing__card" id="pricing-card"></div>
      <div class="pricing__benefits" id="pricing-benefits"></div>
    </div>
  </section>

  <!-- FAQ -->
  <section class="faq" id="faq">
    <div class="container">
      <div class="section-heading">
        <div class="section-tag">
          <span class="section-tag__line"></span>
          <em id="faq-tag"></em>
          <span class="section-tag__line"></span>
        </div>
        <h2 class="section-title" id="faq-title"></h2>
      </div>
      <div class="faq__layout">
        <div class="faq__cta-card" id="faq-cta"></div>
        <div class="faq__list" id="faq-list"></div>
      </div>
    </div>
  </section>

  <!-- Footer / CTA -->
  <footer class="footer" id="contact">
    <div class="footer__bg"></div>
    <div class="container footer__inner">
      <div class="footer__cta-section">
        <div class="footer__tag" id="footer-tag"></div>
        <h2 class="footer__headline" id="footer-headline"></h2>
        <p class="footer__subtext" id="footer-subtext"></p>
        <a class="btn btn--primary footer__btn" id="footer-cta" href="#contact">
          <span></span>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 15L15 5M15 5H6M15 5V14" stroke="currentColor" stroke-width="1.5"/></svg>
        </a>
      </div>
      <div class="footer__bottom">
        <span class="footer__copyright" id="footer-copyright"></span>
        <div class="footer__socials" id="footer-socials"></div>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
